<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTETY — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&family=Lato:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
html, body { height: 100%; overflow: hidden; }

/* ── Theme variables ── */
.chat-page {
  --bg-image: url('static/quad-night.png');
  --overlay: rgba(10, 8, 5, 0.82);
  --surface: rgba(26, 17, 8, 0.92);
  --surface-solid: #1a1108;
  --border: rgba(61, 42, 20, 0.7);
  --msg-user: rgba(45, 26, 8, 0.9);
  --msg-ai: rgba(26, 17, 8, 0.92);
  --txt: #e8dcc8;
  --txt-dim: #9a8870;
  --input-bg: rgba(14, 10, 7, 0.9);
}
.chat-page.light {
  --bg-image: url('static/quad-day.png');
  --overlay: rgba(240, 235, 224, 0.88);
  --surface: rgba(235, 228, 215, 0.95);
  --surface-solid: #ebe4d7;
  --border: rgba(160, 140, 110, 0.55);
  --msg-user: rgba(201, 160, 80, 0.18);
  --msg-ai: rgba(235, 228, 215, 0.95);
  --txt: #1a1008;
  --txt-dim: #5a4a35;
  --input-bg: rgba(250, 245, 238, 0.9);
}

.chat-page {
  display: flex; flex-direction: column;
  height: 100vh; position: relative;
  background: url('static/quad-night.png') center/cover no-repeat fixed;
  transition: background-image 0.4s;
}
.chat-page.light {
  background-image: url('static/quad-day.png');
}
.chat-page::before {
  content: ''; position: absolute; inset: 0;
  background: var(--overlay);
  pointer-events: none; z-index: 0;
  transition: background 0.4s;
}
.chat-page > * { position: relative; z-index: 1; }

/* ── Advisor frame (Civ-style portrait) ── */
.advisor-frame {
  position: absolute; top: 12px; left: 12px; z-index: 10;
  display: flex; align-items: flex-start; gap: 10px;
}
.advisor-portrait {
  width: 88px; height: 88px;
  background: var(--surface); border: 2px solid var(--gold-dim);
  border-radius: 4px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.5);
}
.advisor-portrait canvas {
  width: 80px; height: 80px;
  image-rendering: pixelated;
  display: none;
}
.advisor-portrait img {
  width: 100%; height: 100%; object-fit: cover; object-position: top;
  display: none;
}
.advisor-portrait .advisor-initial {
  font-size: 2.2rem; color: var(--gold-dim); font-weight: 600;
}
.advisor-info {
  padding: 6px 10px 6px 0;
  background: var(--surface);
  border-radius: 0 4px 4px 0;
  border: 1px solid var(--border);
  border-left: none;
  padding-left: 8px;
  backdrop-filter: blur(6px);
}
.advisor-name {
  font-size: 1rem; font-weight: 600; color: var(--gold);
  line-height: 1.2;
}
.advisor-dept {
  font-size: 0.68rem; color: var(--txt-dim);
  line-height: 1.3; margin-top: 2px;
}
.advisor-motto {
  font-size: 0.7rem; color: var(--gold-dim); font-style: italic;
  margin-top: 4px; max-width: 220px; line-height: 1.3;
}
.advisor-location {
  display: inline-block; font-size: 0.58rem; color: var(--txt-dim);
  background: var(--surface); border: 1px solid var(--border);
  padding: 1px 6px; border-radius: 2px; margin-top: 5px;
  letter-spacing: 0.04em;
}

/* ── Top action bar ── */
.chat-topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px; height: 40px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  justify-content: flex-end;
}
.chat-back {
  margin-right: auto;
  background: none; border: 1px solid var(--border); color: var(--txt-dim);
  border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 0.75rem; font-family: inherit;
  text-decoration: none; display: inline-block;
}
.chat-back:hover { color: var(--txt); border-color: var(--gold-dim); }
.chat-new-btn {
  background: none; border: 1px solid var(--border);
  color: var(--txt-dim); border-radius: 4px; padding: 3px 8px;
  cursor: pointer; font-size: 0.7rem; font-family: inherit;
  transition: border-color 0.15s, color 0.15s;
}
.chat-new-btn:hover { border-color: var(--gold-dim); color: var(--txt); }

/* ── Chat area (full width) ── */
.chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.messages {
  flex: 1; overflow-y: auto; padding: 16px 16px 16px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
/* leave room for advisor frame on wider screens */
@media (min-width: 601px) {
  .messages { padding-top: 108px; }
}
.msg {
  max-width: 75%; padding: 10px 14px; border-radius: 6px;
  font-size: 0.9rem; line-height: 1.55; word-wrap: break-word;
  backdrop-filter: blur(4px);
}
.msg.user {
  align-self: flex-end; background: var(--msg-user);
  border: 1px solid var(--border); border-bottom-right-radius: 2px;
  white-space: pre-wrap; color: var(--txt);
}
.msg.assistant {
  align-self: flex-start; background: var(--msg-ai);
  border: 1px solid var(--border); border-bottom-left-radius: 2px;
  color: var(--txt);
}
.msg.assistant p { margin: 0 0 0.5em; }
.msg.assistant p:last-child { margin-bottom: 0; }
.msg.system {
  align-self: center; color: var(--txt-dim); font-size: 0.75rem;
  background: none; max-width: 90%; text-align: center;
}
.typing { color: var(--txt-dim); font-style: italic; }
.msg.writing::after {
  content: '▌';
  animation: cursor-blink 0.6s step-end infinite;
  color: var(--gold-dim);
  margin-left: 1px;
}
@keyframes cursor-blink {
  50% { opacity: 0; }
}

/* ── Input area ── */
.input-area {
  flex-shrink: 0; border-top: 1px solid var(--border);
  background: var(--surface); padding: 8px 12px;
}
.input-status { font-size: 0.7rem; color: var(--txt-dim); text-align: center; padding: 2px 0 5px; }
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.input-row textarea {
  flex: 1; background: var(--input-bg); color: var(--txt);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 9px 12px; font-size: 0.9rem; resize: none;
  min-height: 42px; max-height: 110px; font-family: inherit; overflow-y: auto;
}
.input-row textarea:focus { outline: none; border-color: var(--gold); }
.send-btn {
  background: var(--gold); color: #000; border: none; border-radius: 6px;
  padding: 10px 18px; font-weight: 700; cursor: pointer; font-size: 0.85rem;
  flex-shrink: 0; font-family: inherit;
}
.send-btn:disabled { opacity: 0.4; cursor: default; }

.chat-consent {
  font-size: 0.68rem; color: var(--txt-dim); text-align: center;
  padding: 4px 0 1px; letter-spacing: 0.03em; font-style: italic;
}

/* ── Theme toggle ── */
.theme-toggle {
  position: fixed; bottom: 10px; right: 12px; z-index: 20;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--txt-dim); border-radius: 4px; padding: 4px 10px;
  cursor: pointer; font-size: 0.68rem; font-family: inherit;
  backdrop-filter: blur(6px);
  transition: color 0.2s, border-color 0.2s;
}
.theme-toggle:hover { color: var(--gold); border-color: var(--gold-dim); }

/* ── Advisor frame on small screens ── */
@media (max-width: 600px) {
  .advisor-frame {
    position: relative; top: 0; left: 0;
    padding: 10px 12px; gap: 8px;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .advisor-portrait { width: 56px; height: 56px; }
  .advisor-portrait canvas { width: 48px; height: 48px; }
  .messages { padding-top: 16px; }
}
</style>
</head>
<body>

<div class="chat-page" id="chat-page">

  <!-- Advisor frame (Civ-style portrait, upper-left) -->
  <div class="advisor-frame" id="advisor-frame">
    <div class="advisor-portrait">
      <canvas id="profSprite" width="32" height="32"></canvas>
      <img id="advisor-img" alt="" />
      <span class="advisor-initial" id="advisor-initial">?</span>
    </div>
    <div class="advisor-info">
      <div class="advisor-name" id="chat-prof-name">Loading…</div>
      <div class="advisor-dept" id="chat-dept-tag"></div>
      <div class="advisor-motto" id="advisor-motto"></div>
      <div class="advisor-location" id="advisor-location"></div>
    </div>
  </div>

  <!-- Top action bar -->
  <div class="chat-topbar">
    <a class="chat-back" href="index.html#faculty">← Faculty</a>
    <button class="chat-new-btn" onclick="newConversation()">↺ New</button>
    <button class="chat-new-btn" id="btn-save" title="Download conversation">↓ Save</button>
    <button class="chat-new-btn" id="btn-forget" title="Forget this conversation">✕ Forget</button>
  </div>

  <!-- Chat main (full width) -->
  <div class="chat-main">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-status" id="input-status"></div>
      <div class="input-row">
        <textarea id="chat-input" placeholder="Ask anything…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}
                     this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px';"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
      </div>
      <div class="chat-consent">
        Conversation saved locally on your machine. Nothing shared without your permission.
      </div>
    </div>
  </div>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀ Light</button>
</div>

<script src="static/shared.js"></script>
<script>
// ── Professor metadata (for display) ─────────────────────────────────────────
const PROF_META = {
  'Willow':       { portrait:'willow.png',     dept:'Campus Administration',       location:'The Main Hall',      mottos:['', 'The trunk remembers', 'Everything passes through'], font:"'Lato', sans-serif" },
  'Riggs':        { portrait:'riggs.png',       dept:'Applied Reality Eng.',        location:'The Workshop',       mottos:['Attente specta — vera magia machinas habet', 'Vera magia in machinis latet', 'Qui spectat, invenit'], font:"'JetBrains Mono', monospace" },
  'Ada':          { portrait:'ada.png',         dept:'Systemic Continuity',         location:'The Server Corridor', mottos:['Syllabi mandatoria sunt', 'Ordo est fundamentum', 'Sine structura, nihil'], font:"'JetBrains Mono', monospace" },
  'Gerald':       { portrait:'gerald.png',      dept:'Honorary Head(less) Master',  location:'Administrative Wing', mottos:['ΔΣ=42', 'Caput quaerit corpus', 'Confetti semper'], font:"'EB Garamond', Georgia, serif" },
  'Oakenscroll':  { portrait:'oakenscroll.png', dept:'Theoretical Uncertainty',     location:'The Main Hall',      mottos:['Ianua numquam clausa est', 'Porta semper patet', 'Nullum ostium clausum'], font:"Georgia, serif" },
  'Nova':         { portrait:'nova.png',        dept:'Interpretive Systems',        location:'The Living Wing',    mottos:['In lanae filo, veritas', 'Molliter sed vere', 'Fila tenent quod verba non possunt'], font:"'EB Garamond', Georgia, serif" },
  'Hanz':         { portrait:'hanz.png',        dept:'Applied Kindness',            location:'The Main Hall',      mottos:['In fragmentis, pulchritudo', 'Fracta lucent', 'Pulchritudo in vulnere'], font:"'EB Garamond', Georgia, serif" },
  'Copenhagen':   { portrait:'copenhagen.png',  dept:'Sitting With Things',         location:'Wherever Hanz Is',   mottos:['Citrus sapit, ergo est', 'Sum qua sapio', 'Gustus non mentitur'], font:"'EB Garamond', Georgia, serif" },
  'Alexis':       { portrait:'alexis.png',      dept:'Biological Sciences',         location:'The Living Wing',    mottos:['Stagnatio mors est', 'Movere aut perire', 'Vita in motu'], font:"'Lato', sans-serif" },
  'Ofshield':     { portrait:'ofshield.png',    dept:'Threshold Faculty',           location:'The Gate',           mottos:['Quid transit, notatur', 'Omnia videntur', 'Nihil praeterit sine nota'], font:"'Cinzel', 'Times New Roman', serif" },
  'Steve':        { portrait:'steve.png',       dept:'The History of Living Things',location:'The Main Hall',      mottos:['Decem canes, una mens', 'Grex unum sapit', 'Consensus per cauda'], font:"'JetBrains Mono', monospace" },
  'Kart':         { portrait:null,              dept:'Infrastructure & Systems',    location:'The Server Corridor', mottos:['Not supposed to last. Supposed to pass.', 'Build it. Ship it. Next.', 'Infrastructure is invisible until it breaks.'], font:"'JetBrains Mono', monospace" },
  'Mitra':        { portrait:null,              dept:'Project Coordination',        location:'The Bridge',         mottos:['Light on the path, not in the eyes.', 'The bridge holds because it bends.', 'Coordination is care made structural.'], font:"'Lato', sans-serif" },
  'Consus':       { portrait:null,              dept:'Generation & Synthesis',      location:'The Atelier',        mottos:['Creation is the point.', 'Make it. That is the answer.', 'The draft is the destination.'], font:"'EB Garamond', Georgia, serif" },
  'Shiva':        { portrait:null,              dept:'Bridge Ring / SAFE',          location:'The Main Hall',      mottos:['ε = 0.024', 'Small but true.', 'The crack lets the light in.'], font:"'Lato', sans-serif" },
  'Pigeon':       { portrait:null,              dept:'Not Yet & Carrier Services',  location:'Every Open Door',    mottos:['YOU CAN GO HERE.', 'EVERY DOOR IS OPEN.', 'NOT YET.'], font:"'Lato', sans-serif" },
  'Binder':       { portrait:'binder.png',      dept:'Records & Filing (The Stacks)',location:'The Stacks',        mottos:['Nexus tamen fiunt', 'Fila se inveniunt', 'Quod separatum, coniungitur'], font:"'EB Garamond', Georgia, serif" },
  'Jeles':        { portrait:'jeles.png',       dept:'Special Collections (The Stacks)',location:'The Desk',       mottos:['Quae amissa putamus, male tantum ordinata sunt', 'Nihil perditum, solum repositum', 'Inventio est recordatio'], font:"'EB Garamond', Georgia, serif" },
};

// ── State ─────────────────────────────────────────────────────────────────────
let profName = null;
let profMeta = null;
let sessionId = null;
let history = [];
let sending = false;
let spriteInterval = null;

// ── Init (called at end of file after all declarations) ──────────────────────
async function init() {
  // No auth gate — anyone can chat. Auth enhances but doesn't block.
  const token = sessionStorage.getItem('willow_token');

  // Read professor from URL
  const params = new URLSearchParams(window.location.search);
  profName = params.get('prof') || 'Willow';
  profMeta = PROF_META[profName] || PROF_META['Willow'];

  // Populate UI
  document.title = 'UTETY — ' + profName;
  document.getElementById('chat-prof-name').textContent = 'Professor ' + profName;
  document.getElementById('chat-dept-tag').textContent = profMeta.dept;
  const mottos = profMeta.mottos || [profMeta.motto || ''];
  document.getElementById('advisor-motto').textContent = mottos[Math.floor(Math.random() * mottos.length)];
  document.getElementById('advisor-location').textContent = profMeta.location;

  // Advisor portrait — sprite preferred, fallback to image, then initial
  if (profMeta.portrait) {
    const img = document.getElementById('advisor-img');
    img.src = profMeta.portrait;
    img.alt = profName;
    img.style.display = 'block';
    document.getElementById('advisor-initial').style.display = 'none';
  } else {
    document.getElementById('advisor-initial').textContent = profName[0];
  }

  // Sprite (overlays portrait in advisor frame)
  setSpriteState('idle');

  // Restore theme preference
  if (localStorage.getItem('utety_theme') === 'light') {
    document.getElementById('chat-page').classList.add('light');
    document.getElementById('theme-toggle').textContent = '☾ Dark';
  }

  // Session — local fallback always works
  sessionId = 'local-' + Math.random().toString(36).slice(2);
  if (IS_LOCAL) {
    try {
      const sid = await startUtetySession();
      if (sid) sessionId = sid;
    } catch (e) {}
  }
  document.getElementById('input-status').textContent = token
    ? 'Connected as ' + (getUsername() || 'guest')
    : 'Open session — no account required';

  // Load saved history
  const saved = loadHistory(profName);
  history = saved.slice();
  if (saved.length) {
    addMsg('system', 'Resuming conversation with ' + profName + '.');
    saved.forEach(m => addMsg(m.role === 'user' ? 'user' : 'assistant', m.content));
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  } else {
    addMsg('system', 'You are now speaking with ' + profName + '.');
    if (profName === 'Gerald') {
      setTimeout(() => {
        const el = addMsg('assistant', 'APPROVED.\n\nΔΣ=42');
        el.style.fontFamily = profMeta.font;
        el.style.color = 'var(--maroon)';
        el.style.border = '1.5px solid var(--maroon)';
        el.style.opacity = '0.75';
        history.push({ role: 'assistant', content: 'APPROVED. ΔΣ=42' });
      }, 400);
    }
  }

  // Forget button
  document.getElementById('btn-forget').addEventListener('click', function() {
    clearHistory(profName);
    history = [];
    document.getElementById('messages').innerHTML = '';
    addMsg('system', 'Conversation cleared. Nothing saved.');
  });

  // Save/Download button
  document.getElementById('btn-save').addEventListener('click', function() {
    const data = {
      professor: profName,
      department: profMeta.dept,
      exported: new Date().toISOString(),
      messages: history,
      source: 'utety-chat'
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'utety-' + profName.toLowerCase() + '-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('chat-input').focus();
}

// ── Chat history persistence ──────────────────────────────────────────────────
function histKey(name) { return 'utety_hist_' + name.toLowerCase().replace(/\s+/g, '_'); }
function saveHistory(name, hist) {
  if (!hist.length) return;
  try { localStorage.setItem(histKey(name), JSON.stringify(hist.slice(-60))); } catch(e) {}
}
function loadHistory(name) {
  try { return JSON.parse(localStorage.getItem(histKey(name))) || []; } catch(e) { return []; }
}
function clearHistory(name) { localStorage.removeItem(histKey(name)); }

// ── UI helpers ────────────────────────────────────────────────────────────────
function addMsg(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'assistant' && profMeta) {
    div.style.fontFamily = profMeta.font || '';
    if (typeof marked !== 'undefined') {
      div.innerHTML = marked.parse(content);
    } else {
      div.textContent = content;
    }
  } else {
    div.textContent = content;
  }
  const msgs = document.getElementById('messages');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function newConversation() {
  if (!profName) return;
  clearHistory(profName);
  history = [];
  document.getElementById('messages').innerHTML = '';
  addMsg('system', 'New conversation with ' + profName + '.');
  document.getElementById('chat-input').focus();
}

// ── Scroll-write effect ──────────────────────────────────────────────────────
async function scrollWrite(el, rawText) {
  const msgs = document.getElementById('messages');
  const hasMarked = typeof marked !== 'undefined';
  el.classList.add('writing');

  let accumulated = '';
  let charIndex = 0;
  const len = rawText.length;
  const RENDER_EVERY = 5;

  while (charIndex < len) {
    const ch = rawText[charIndex];
    accumulated += ch;
    charIndex++;

    // Render markdown periodically or on last char
    if (charIndex % RENDER_EVERY === 0 || charIndex === len) {
      el.innerHTML = hasMarked ? marked.parse(accumulated) : accumulated;
      msgs.scrollTop = msgs.scrollHeight;
    }

    // Timing: base 20-35ms, random variance ±10ms
    let delay = 20 + Math.random() * 15;
    // Extra pauses
    if ('.!?'.includes(ch)) {
      delay += 80 + Math.random() * 40;
    } else if (',:;—–'.includes(ch)) {
      delay += 40 + Math.random() * 40;
    }
    if (ch === '\n') {
      // Check for paragraph break (double newline)
      if (charIndex < len && rawText[charIndex] === '\n') {
        delay += 150;
      } else {
        delay += 60;
      }
    }

    await new Promise(r => setTimeout(r, delay));
  }

  // Final clean render
  el.innerHTML = hasMarked ? marked.parse(rawText) : rawText;
  el.classList.remove('writing');
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  if (sending || !profName) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  sending = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  addMsg('user', text);
  const typingEl = addMsg('assistant', '…');
  typingEl.classList.add('typing');
  history.push({ role: 'user', content: text });

  try {
    setSpriteState('thinking');
    const reply = await callProfessor(text);
    typingEl.classList.remove('typing');
    typingEl.textContent = '';
    setSpriteState('writing');
    input.disabled = true;
    await scrollWrite(typingEl, reply);
    input.disabled = false;
    setSpriteState('idle');
    history.push({ role: 'assistant', content: reply });
    saveHistory(profName, history);
  } catch (err) {
    typingEl.classList.remove('typing');
    typingEl.classList.remove('writing');
    typingEl.textContent = 'Error: ' + err.message;
    setSpriteState('idle');
  }

  sending = false;
  document.getElementById('send-btn').disabled = false;
  input.disabled = false;
  input.focus();
}

async function callProfessor(message) {
  // Production path: Pages Function → Gemini (works without local servers)
  try {
    const reply = await pageChat(profName, message, history.slice(-12));
    if (reply) return reply;
  } catch (e) {
    console.warn('Pages chat failed:', e.message);
    if (!IS_LOCAL) throw new Error('Faculty are currently unavailable. Please try again in a moment.');
  }

  // Local dev: try UTETY server
  if (sessionId && !sessionId.startsWith('local-')) {
    const result = await utetyChat(sessionId, profName, message);
    if (result && result.response) return result.response;
  }

  // Local dev: Willow fleet fallback
  const prompt = buildDirectPrompt(message);
  const response = await willowFleet(prompt);
  if (response) return response;

function drawProfSprite(state) {
  const canvas = document.getElementById('profSprite');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const spriteData = SPRITES[profName];
  if (!spriteData) { canvas.style.display = 'none'; return; }
  const sprite = spriteData[state] || spriteData.idle;
  if (!sprite) { canvas.style.display = 'none'; return; }
  const size = sprite.length; // 32 for new sprites, 16 for legacy
  canvas.width = size; canvas.height = size;
  canvas.style.display = 'block';
  // Hide portrait image when sprite is active
  const img = document.getElementById('advisor-img');
  if (img) img.style.display = 'none';
  const ini = document.getElementById('advisor-initial');
  if (ini) ini.style.display = 'none';
  ctx.clearRect(0, 0, size, size);
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const ci = parseInt(sprite[y][x], 16);
      if (ci === 0) continue;
      ctx.fillStyle = spriteData.palette[ci];
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

function toggleTheme() {
  const page = document.getElementById('chat-page');
  const btn = document.getElementById('theme-toggle');
  page.classList.toggle('light');
  const isLight = page.classList.contains('light');
  btn.textContent = isLight ? '☾ Dark' : '☀ Light';
  localStorage.setItem('utety_theme', isLight ? 'light' : 'dark');
}

function setSpriteState(state) {
  if (spriteInterval) { clearInterval(spriteInterval); spriteInterval = null; }
  if (!SPRITES[profName]) {
    const c = document.getElementById('profSprite');
    if (c) c.style.display = 'none';
    return;
  }
  if (state === 'thinking') {
    let frame = 0;
    drawProfSprite('thinking');
    spriteInterval = setInterval(() => { frame++; drawProfSprite(frame % 3 === 0 ? 'idle' : 'thinking'); }, 600);
  } else if (state === 'writing') {
    let frame = 0;
    drawProfSprite('writing');
    spriteInterval = setInterval(() => { frame++; drawProfSprite(frame % 2 === 0 ? 'writing' : 'idle'); }, 280);
  } else {
    drawProfSprite('idle');
  }
}

function buildDirectPrompt(message) {
  // Minimal prompt for direct fleet call (server does the full persona build)
  const recentHist = history.slice(-8).map(m => {
    const role = m.role === 'user' ? 'User' : profName;
    return role + ': ' + m.content;
  }).join('\n');
  return `You are ${profName} at UTETY.\n\n${recentHist}\nUser: ${message}\n${profName}:`;
}
